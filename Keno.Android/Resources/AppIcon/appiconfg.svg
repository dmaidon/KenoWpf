<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
	<rect width="512" height="512" fill="none" />

	<!-- Red Ball (10) -->
	<circle cx="180" cy="170" r="90" fill="#d62828" />
	<circle cx="180" cy="170" r="55" fill="#ffffff" />
	<text x="180" y="185" font-size="48" font-family="Arial" font-weight="bold" text-anchor="middle" fill="#d62828">10</text>

	<!-- Green Ball (18) -->
	<circle cx="330" cy="170" r="90" fill="#2a9d8f" />
	<circle cx="330" cy="170" r="55" fill="#ffffff" />
	<text x="330" y="185" font-size="48" font-family="Arial" font-weight="bold" text-anchor="middle" fill="#2a9d8f">18</text>

	<!-- Blue Ball (11) -->
	<circle cx="180" cy="330" r="90" fill="#1d4ed8" />
	<circle cx="180" cy="330" r="55" fill="#ffffff" />
	<text x="180" y="345" font-size="48" font-family="Arial" font-weight="bold" text-anchor="middle" fill="#1d4ed8">11</text>

	<!-- Yellow Ball (1) -->
	<circle cx="330" cy="330" r="90" fill="#f4d35e" />
	<circle cx="330" cy="330" r="55" fill="#ffffff" />
	<text x="330" y="345" font-size="48" font-family="Arial" font-weight="bold" text-anchor="middle" fill="#f4d35e">1</text>

	<!-- Keno Text -->
	<text x="256" y="275"
		  font-size="80"
		  font-family="Arial"
		  font-weight="bold"
		  text-anchor="middle"
		  fill="#ffffff"
		  stroke="#000000"
		  stroke-width="6">
		Keno
	</text>
</svg>